# Default configuration for the trainload pipeline.
# These values are merged over the built-in defaults in trainload/config.py.

timezone: UTC
week_anchor: MON

sports:
  - run
  - ride
  - swim
  - other

pmc:
  ctl_days: 42
  atl_days: 7
  seed_days: 0

acwr:
  acute_days: 7
  chronic_days: 28
  flag_threshold: 1.5
  min_chronic_load: 10.0

zones:
  edges_pct_lthr: [0.0, 0.68, 0.83, 0.94, 1.05, 2.00]
  labels: ["Z1", "Z2", "Z3", "Z4", "Z5"]

athlete_defaults:
  lthr: 165
  ftp: 230
  css_pace_s_per_100m: 95

dedup:
  overlap_tolerance_s: 40
